// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════

const SIGNS = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
const SIGN_SYMBOLS = ['♈︎','♉︎','♊︎','♋︎','♌︎','♍︎','♎︎','♏︎','♐︎','♑︎','♒︎','♓︎'];

  Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇',Chiron:'⚷',Node:'☊'

const ASPECT_SYMBOLS = { conjunction:'☌', opposition:'☍', trine:'△', square:'□', sextile:'✶' };
const ASPECT_COLORS = { conjunction:'#ff4444', opposition:'#4488ff', trine:'#44cc44', square:'#ff8844', sextile:'#44ccaa' };

function signNum(s) { return SIGNS.indexOf(s); }
function eclipticLongitude(sign, deg) { return signNum(sign) * 30 + deg; }
function zodiacStr(deg) {
  deg = ((deg % 360) + 360) % 360;
  const s = Math.floor(deg / 30);
  const d = deg - s * 30;
  return `${SIGN_SYMBOLS[s]} ${d.toFixed(1)}°`;
}
function zodiacSimple(deg) {
  deg = ((deg % 360) + 360) % 360;
  const s = Math.floor(deg / 30);
  return SIGNS[s];
}
function zodiacDeg(deg) {
  deg = ((deg % 360) + 360) % 360;
  const s = Math.floor(deg / 30);
  return deg - s * 30;
}

function compLon(pt) {
  if (!COMPOSITE[pt]) return 0;
  return eclipticLongitude(COMPOSITE[pt].sign, COMPOSITE[pt].deg);
}

function aurelianLon(pt) {
  if (!AURELIAN[pt]) return 0;
  return eclipticLongitude(AURELIAN[pt].sign, AURELIAN[pt].deg);
}

const AURELIAN_POINTS = ['sun','moon','merc','ven','mars','jup','sat','uran','nept','plu','asc','mc'];
const AURELIAN_NAMES = { sun:'☉️Sun', moon:'☽︎Moon', merc:'☿Mercury', ven:'♀︎Venus', mars:'♂︎Mars', jup:'♃Jupiter', sat:'♄Saturn', uran:'♅Uranus', nept:'♆Neptune', plu:'♇Pluto', asc:'⬆ASC', mc:'⏚MC' };

// Aspect detection
const ORBS = { conjunction: 8, opposition: 8, trine: 8, square: 6, sextile: 6 };
function getAspect(a, b) {
  let diff = Math.abs(a - b) % 360;
  if (diff > 180) diff = 360 - diff;
  const aspects = [
    { name: 'conjunction', angle: 0, orb: ORBS.conjunction },
    { name: 'opposition',  angle: 180, orb: ORBS.opposition },
    { name: 'trine',       angle: 120, orb: ORBS.trine },
    { name: 'square',      angle: 90, orb: ORBS.square },
    { name: 'sextile',     angle: 60, orb: ORBS.sextile }
  ];
  for (const asp of aspects) {
    const o = Math.abs(diff - asp.angle);
    if (o <= asp.orb) return { ...asp, orbExact: o, orbMax: asp.orb, strength: 1 - (o / asp.orb) };
  }
  return null;
}

// Planet transits from astronomy-engine
const PLANET_BODIES = {
  Sun: Astronomy.Body.Sun, Moon: Astronomy.Body.Moon, Mercury: Astronomy.Body.Mercury,

function getTransitPositions(date) {
  const pos = {};
  for (const [name, body] of Object.entries(PlanetBodies)) {

// ══════════════════════════════════════════════════════════════════
//  3. MERKABA GEOMETRY
// ══════════════════════════════════════════════════════════════════

// Convert zodiac positions to compass bearings
// ASC Gemini 11.93° → celestial bearing, then projected to compass
// MC Pisces 5.77° → celestial bearing

// 8 Merkaba vertices derived from tetrahedral geometry
// Using the ASC/MC as primary orientation axes, projected at 1.2km from center
const MERKABA_RADIUS = 1.2; // km from center
// Angular offsets for tetrahedral vertices (in degrees from reference axis)
// Upper tetrahedron (masculine/expansive)
// Lower tetrahedron (feminine/receptive)

function bearingFromZodiac(deg) {
  // Convert zodiac longitude (0° Aries = 0°) to compass bearing
  // Spring equinox (0° Aries) = 0° bearing = North in celestial terms
  // But for practical map projection, we orient based on ASC
  return ((deg * -1 + 90) % 360 + 360) % 360;
}

function destFromBearing(lat, lng, bearingDeg, distKm) {
  const R = 6371;
  const brng = bearingDeg * Math.PI / 180;
  const d = distKm / R;
  const φ1 = lat * Math.PI / 180;
  const λ1 = lng * Math.PI / 180;
  const φ2 = Math.asin(Math.sin(φ1)*Math.cos(d) + Math.cos(φ1)*Math.sin(d)*Math.cos(brng));
  const λ2 = λ1 + Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(φ1), Math.cos(d)-Math.sin(φ1)*Math.sin(φ2));
  return { lat: φ2 * 180 / Math.PI, lng: λ2 * 180 / Math.PI };
}

function generateMerkaba() {
  // Primary axes from composite
  const ascLon = compLon('asc');   // Gemini ~71.93°
  const mcLon = compLon('mc');      // Pisces ~335.77°
  const ascBearing = bearingFromZodiac(ascLon);
  const mcBearing = bearingFromZodiac(mcLon);

  // 8 tetrahedral vertices
  // 4 upper (expansive) + 4 lower (receptive)
  const vertices = [];
  const tetraAngles = [0, 72, 144, 216, 288]; // pentagonal pattern for projection
  // Actually, a star tetrahedron has 8 vertices. The 4 upper vertices
  // are offset from the 4 lower by 60° rotation.
  const upOffsets = [0, 120, 240];
  const downOffsets = [60, 180, 300];

  // Upper tetrahedron vertices (masculine — Veyron axis)
  const upBearings = [
    (ascBearing + 0) % 360,
    (ascBearing + 109.47) % 360,
    (ascBearing + 180) % 360,
    (ascBearing + 289.47) % 360
  ];

  // Lower tetrahedron vertices (feminine — Lilith axis)
  const downBearings = [
    (mcBearing + 54.74) % 360,
    (mcBearing + 125.26) % 360,
    (mcBearing + 234.74) % 360,
    (mcBearing + 305.26) % 360
  ];

  // Upper vertices
  upBearings.forEach((b, i) => {
    const d = destFromBearing(BASE.lat, BASE.lng, b, MERKABA_RADIUS * (1 + (i % 2) * 0.3));
    vertices.push({
      lat: d.lat, lng: d.lng,
      label: `⬆ V${i+1}`,
      type: 'upper',
      bearing: b,
      color: '#ff6644'
    });
  });

  // Lower vertices
  downBearings.forEach((b, i) => {
    const d = destFromBearing(BASE.lat, BASE.lng, b, MERKABA_RADIUS * (1 + (i % 2) * 0.3));
    vertices.push({
      lat: d.lat, lng: d.lng,
      label: `⬇ V${i+5}`,
      type: 'lower',
      bearing: b,
      color: '#4488ff'
    });
  });

  // 6 star-point rays (from the composite hexagram)
  const starPoints = [
    { name: 'Saturn♄—Saturn♄',   comp: 'sat', color: '#ff8844', radius: 2.0 },
    { name: 'Sun☉️—Moon☽︎',       comp: 'sun', color: '#ffdd44', radius: 1.8 },
    { name: 'Venus♀︎—Mars♂︎',     comp: 'ven', color: '#ff66aa', radius: 1.6 },
    { name: 'Mercury☿—Jupiter♃', comp: 'merc',color: '#44ddff', radius: 1.4 },
    { name: 'Uranus♅—Neptune♆',  comp: 'uran',color: '#44ffaa', radius: 1.2 },
    { name: 'Pluto♇—Pluto♇',     comp: 'plu', color: '#8844ff', radius: 1.0 }
  ];

  const rays = starPoints.map(sp => {
    const lon = compLon(sp.comp);
    const bearing = bearingFromZodiac(lon);
    const end = destFromBearing(BASE.lat, BASE.lng, bearing, sp.radius);
    return {
      ...sp,
      bearing,
      start: { lat: BASE.lat, lng: BASE.lng },
      end,
      lon
    };
  });

  return { vertices, rays, ascBearing, mcBearing, ascLon, mcLon };
}

const layers = { markers: [], lines: [], circles: [] };
let currentMerkaba = null;

function renderMerkaba() {
  // Clear previous
  layers.markers.forEach(m => map.removeLayer(m));
  layers.lines.forEach(l => map.removeLayer(l));
  layers.circles.forEach(c => map.removeLayer(c));
  layers.markers = [];
  layers.lines = [];
  layers.circles = [];

  const merk = generateMerkaba();
  currentMerkaba = merk;

  const toggles = {};
  document.querySelectorAll('.layer-btn').forEach(b => {
    toggles[b.dataset.layer] = b.classList.contains('active');
  });

  // Center marker
  const centerIcon = L.divIcon({
    html: `<div style="width:16px;height:16px;background:#b8860b;border:2px solid #d4a017;border-radius:50%;box-shadow:0 0 12px rgba(184,134,11,0.6)"></div>`,
    iconSize: [16,16], iconAnchor: [8,8], className: ''
  });
  const centerMarker = L.marker([BASE.lat, BASE.lng], { icon: centerIcon, zIndexOffset: 1000 }).addTo(map);
  centerMarker.bindTooltip('⬡ MERIDIAN POINT — 33.99847°N / 118.42061°W', { direction:'top', className:'marker-label' });
  layers.markers.push(centerMarker);

  if (toggles.vertices) {
    // Vertex markers
    merk.vertices.forEach(v => {
      const color = v.type === 'upper' ? '#ff6644' : '#4488ff';
      const icon = L.divIcon({
        html: `<div style="width:10px;height:10px;background:${color};border:1px solid #fff;border-radius:50%;box-shadow:0 0 8px ${color}"></div>`,
        iconSize: [10,10], iconAnchor: [5,5], className: ''
      });
      const m = L.marker([v.lat, v.lng], { icon }).addTo(map);
      m.bindTooltip(v.label, { direction:'top', className:'marker-label' });
      layers.markers.push(m);

      // Line from center to vertex
      const line = L.polyline([[BASE.lat, BASE.lng], [v.lat, v.lng]], {
        color: color, weight: 1, opacity: 0.4, dashArray: '4,6'
      }).addTo(map);
      layers.lines.push(line);
    });
  }

  if (toggles.rays) {
    // Star-point rays
    merk.rays.forEach(r => {
      const rayLine = L.polyline([[r.start.lat, r.start.lng], [r.end.lat, r.end.lng]], {
        color: r.color, weight: 2, opacity: 0.6
      }).addTo(map);
      layers.lines.push(rayLine);

      // Endpoint marker
      const icon = L.divIcon({
        html: `<div style="width:8px;height:8px;background:${r.color};border:1px solid #fff;border-radius:50%;box-shadow:0 0 10px ${r.color}"></div>`,
        iconSize: [8,8], iconAnchor: [4,4], className: ''
      });
      const m = L.marker([r.end.lat, r.end.lng], { icon }).addTo(map);
      m.bindTooltip(r.name, { direction:'top', className:'marker-label' });
      layers.markers.push(m);
    });
  }

  if (toggles.axes) {
    // ASC/DSC axis
    const ascB = merk.ascBearing;
    const ascEnd = destFromBearing(BASE.lat, BASE.lng, ascB, 2.0);
    const dscEnd = destFromBearing(BASE.lat, BASE.lng, (ascB + 180) % 360, 2.0);
    const axisLine = L.polyline([[ascEnd.lat, ascEnd.lng], [dscEnd.lat, dscEnd.lng]], {
      color: '#b8860b', weight: 1, opacity: 0.3, dashArray: '8,12'
    }).addTo(map);
    layers.lines.push(axisLine);
    // MC/IC axis
    const mcB = merk.mcBearing;
    const mcEnd = destFromBearing(BASE.lat, BASE.lng, mcB, 2.0);
    const icEnd = destFromBearing(BASE.lat, BASE.lng, (mcB + 180) % 360, 2.0);
    const mcLine = L.polyline([[mcEnd.lat, mcEnd.lng], [icEnd.lat, icEnd.lng]], {
      color: '#8866cc', weight: 1, opacity: 0.3, dashArray: '8,12'
    }).addTo(map);
    layers.lines.push(mcLine);
  }

  if (toggles.hexagram) {
    // Draw the 6-point star as a hexagram connecting star-point endpoints
    const points = merk.rays.map(r => r.end);
    // Connect in star pattern: 0-2-4-1-3-5-0
    const hexOrder = [0, 2, 4, 1, 3, 5, 0];
    const hexCoords = hexOrder.map(i => [points[i].lat, points[i].lng]);
    const hexLine = L.polyline(hexCoords, {
      color: '#d4a017', weight: 1, opacity: 0.25, dashArray: '3,6'
    }).addTo(map);
    layers.lines.push(hexLine);
  }

  if (toggles.cameras) {
    // Camera node suggestions at strategic points
    const cameraPositions = generateCameraNodes(merk);
    cameraPositions.forEach((cam, i) => {
      const icon = L.divIcon({
        html: `<div style="width:12px;height:12px;background:#44ff44;border:2px solid #66ff66;border-radius:2px;transform:rotate(45deg);box-shadow:0 0 12px rgba(68,255,68,0.4)"></div>`,
        iconSize: [12,12], iconAnchor: [6,6], className: ''
      });
      const m = L.marker([cam.lat, cam.lng], { icon }).addTo(map);
      m.bindTooltip(`📷 ${cam.name}`, { direction:'top', className:'marker-label' });
      layers.markers.push(m);
      // Fan wedge
      if (cam.fanBearing) {
        const fanEnd1 = destFromBearing(cam.lat, cam.lng, cam.fanBearing - cam.fanWidth/2, cam.range);
        const fanEnd2 = destFromBearing(cam.lat, cam.lng, cam.fanBearing + cam.fanWidth/2, cam.range);
        L.polygon([
          [cam.lat, cam.lng],
          [fanEnd1.lat, fanEnd1.lng],
          [fanEnd2.lat, fanEnd2.lng]
        ], { color: '#44ff44', weight: 1, fillColor: '#44ff44', fillOpacity: 0.05 }).addTo(map);
      }
    });
  }
}

function generateCameraNodes(merk) {
  // Strategic camera placements on Merkaba vertices and along star rays
  return [
    { lat: BASE.lat, lng: BASE.lng, name: 'Meridian Hub', fanBearing: 0, fanWidth: 360, range: 0.5 },
    { lat: merk.vertices[0].lat, lng: merk.vertices[0].lng, name: 'Vertex North', fanBearing: 0, fanWidth: 120, range: 0.6 },
    { lat: merk.vertices[1].lat, lng: merk.vertices[1].lng, name: 'Vertex East', fanBearing: 90, fanWidth: 120, range: 0.6 },
    { lat: merk.vertices[2].lat, lng: merk.vertices[2].lng, name: 'Vertex South', fanBearing: 180, fanWidth: 120, range: 0.6 },
    { lat: merk.vertices[3].lat, lng: merk.vertices[3].lng, name: 'Vertex West', fanBearing: 270, fanWidth: 120, range: 0.6 },
    ...merk.rays.slice(0, 3).map(r => ({
      lat: r.end.lat, lng: r.end.lng,
      name: `Cam ${r.name.split('—')[0]}`,
      fanBearing: r.bearing, fanWidth: 90, range: 0.4
    }))
  ];
}

const compPoints = ['sun','moon','merc','ven','mars','jup','sat','uran','nept','plu'];
const compNames = { sun:'☉️Sun', moon:'☽︎Moon', merc:'☿Mercury', ven:'♀︎Venus', mars:'♂︎Mars', jup:'♃Jupiter', sat:'♄Saturn', uran:'♅Uranus', nept:'♆Neptune', plu:'♇Pluto' };

const STAR_PAIRS = [
  ['sat','sat','♄'],
  ['sun','moon','☉️☽︎'],
  ['ven','mars','♀︎♂︎'],
  ['merc','jup','☿♃'],
  ['uran','nept','♅♆'],
  ['plu','plu','♇♇']
];

function updateTransits(date) {
  const transits = getTransitPositions(date);

  const starAspects = [];
  let totalStrength = 0;
  let maxStrong = 0;

  // Check each star pair for transit aspects
  STAR_PAIRS.forEach(([p1, p2, sym]) => {
    const compLon1 = compLon(p1);
    const compLon2 = compLon(p2);
    // Check transits against both composite points
    for (const [tName, tLon] of Object.entries(transits)) {
      const a1 = getAspect(tLon, compLon1);
      const a2 = getAspect(tLon, compLon2);
      if (a1 && a1.strength > 0.1) {
        starAspects.push({
          transit: tName, composite: p1, aspect: a1,
          label: `${PLANET_NAMES[tName]||tName} ${ASPECT_SYMBOLS[a1.name]} ${compNames[p1]}`
        });
        if (a1.strength > maxStrong) maxStrong = a1.strength;
        totalStrength += a1.strength;
      }
      if (a2 && a2.strength > 0.1) {
        starAspects.push({
          transit: tName, composite: p2, aspect: a2,
          label: `${PLANET_NAMES[tName]||tName} ${ASPECT_SYMBOLS[a2.name]} ${compNames[p2]}`
        });
        if (a2.strength > maxStrong) maxStrong = a2.strength;
        totalStrength += a2.strength;
      }
    }
  });

  // Display transit positions (top 5)
  const transitDiv = document.getElementById('transit-positions');
  const sortedTrans = Object.entries(transits).sort((a,b) => a[1]-b[1]);
  transitDiv.innerHTML = '<div class="transit-list">' +
    sortedTrans.map(([name, lon]) =>
      `<div class="transit-item"><span class="body">${PLANET_NAMES[name]||name}</span><span class="zodiac">${zodiacStr(lon)}</span></div>`
    ).join('') + '</div>';

  // Display aspects
  const aspectDiv = document.getElementById('aspect-list');
  starAspects.sort((a,b) => b.aspect.strength - a.aspect.strength);
  aspectDiv.innerHTML = starAspects.length === 0
    ? '<div style="color:var(--fg2);font-size:12px">No active transits to composite points</div>'
    : '<div class="aspect-grid">' + starAspects.slice(0, 15).map(a =>
      `<div class="aspect-row active">
        <span class="planet">${PLANET_NAMES[a.transit]||a.transit}</span>
        <span class="symbol" style="color:${ASPECT_COLORS[a.aspect.name]}">${ASPECT_SYMBOLS[a.aspect.name]}</span>
        <span class="position">${zodiacStr(transits[a.transit])}</span>
        <span class="detail">${a.label.split(' ').slice(2).join(' ')}</span>
        <span class="orb">${a.aspect.orbExact.toFixed(1)}°</span>
      </div>`
    ).join('') + '</div>';

  // Influence meter
  const influence = Math.min(totalStrength / 10, 1);
  const fill = document.getElementById('influence-fill');
  const label = document.getElementById('influence-label');
  fill.style.width = (influence * 100) + '%';
  const hue = influence < 0.3 ? 0 : influence < 0.6 ? 60 : 120;
  fill.style.background = `hsl(${hue}, 80%, 50%)`;
  const levels = ['Quiet', 'Subtle', 'Moderate', 'Strong', 'Intense'];
  const level = Math.min(Math.floor(influence * 5), 4);
  label.textContent = `${levels[level]} — ${starAspects.length} active aspect${starAspects.length !== 1 ? 's' : ''}`;

  // Update star points display
  const starDiv = document.getElementById('star-points');
  starDiv.innerHTML = '<div class="transit-list">' + STAR_PAIRS.map(([p1, p2, sym]) => {
    const lon1 = compLon(p1);
    const lon2 = compLon(p2);
    return `<div class="transit-item"><span class="body">${sym}</span><span class="zodiac">${zodiacStr(lon1)}</span><span class="zodiac" style="color:#555">↔</span><span class="zodiac">${zodiacStr(lon2)}</span></div>`;
  }).join('') + '</div>';

  return { transits, aspects: starAspects, influence };
}

function generateAurelianReading(transits) {
  const aspects = [];
  let t1Score = 0, t2Score = 0;

  for (const [ptName, ptLon] of Object.entries(transits)) {
    for (const ap of AURELIAN_POINTS) {
      const aLon = aurelianLon(ap);
      if (!aLon) continue;
      const asp = getAspect(ptLon, aLon);
      if (asp && asp.strength > 0.15) {
        // Get or generate reading text
        let readingText = '';
        const aspectTable = ASPECT_READINGS[asp.name];
        if (aspectTable && aspectTable[ap]) {
          readingText = aspectTable[ap].replace('{transit}', PLANET_NAMES[ptName] || ptName);
        } else {
          readingText = (DEFAULT_READINGS[ap] || '{transit} aspects the entity\'s {ap} point.')
            .replace('{transit}', PLANET_NAMES[ptName] || ptName)
            .replace('{ap}', ap);
        }

        aspects.push({
          transit: ptName,
          aurelianPt: ap,
          aspect: asp,
          reading: readingText,
          transitLon: ptLon
        });

        // Score which triangle is being hit
        if (TRIANGLE_1.points.includes(ap)) t1Score += asp.strength;
        if (TRIANGLE_2.points.includes(ap)) t2Score += asp.strength;
      }
    }
  }

  // Sort by strength
  aspects.sort((a, b) => b.aspect.strength - a.aspect.strength);

  // Determine which triangle is dominant
  let triangleReading = '';
  const diff = t1Score - t2Score;
  if (Math.abs(diff) > 0.3) {
    if (diff > 0) {
      triangleReading = `⬣ BASE TRIANGLE dominant — the embodied self is processing today. Moon/Mars/Saturn axis active.`;
    } else {
      triangleReading = `⬡ APEX TRIANGLE dominant — the light body is ascendent. Sun/Venus/Jupiter axis active.`;
    }
  } else if (t1Score > 0.1 || t2Score > 0.1) {
    triangleReading = `⬣⬡ TWIN TRIANGLES balanced — both tetrahedrons spinning. Entity fully engaged.`;
  } else {
    triangleReading = `⟐ Background field — no major triangle activation. Integration phase.`;
  }

  return { aspects, triangleReading, t1Score, t2Score };
}

const datePicker = document.getElementById('date-picker');
const dateSlider = document.getElementById('date-slider');
const dateDisplay = document.getElementById('date-display');

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function updateDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  const str = `${y}-${m}-${d}`;
  datePicker.value = str;

  // Update slider offset from today
  const today = new Date();
  const diff = Math.round((date - today) / (1000*60*60*24));
  dateSlider.value = Math.max(-365, Math.min(365, diff));

  dateDisplay.textContent = str;

  // Update UI
  document.getElementById('influence-summary').textContent =
    `${date.toDateString()} — ${PLANET_NAMES.Sun} in ${zodiacStr(getTransitPositions(date).Sun)}`;

  updateTransits(date);
}

function initDateControls() {
  const today = new Date();
  datePicker.value = todayStr();
  datePicker.addEventListener('change', () => {
    const parts = datePicker.value.split('-');
    updateDate(new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2])));
  });
  dateSlider.addEventListener('input', () => {
    const d = new Date();
    d.setDate(d.getDate() + parseInt(dateSlider.value));
    updateDate(d);
  });
  updateDate(today);
}
